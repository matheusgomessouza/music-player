name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd projects/backend && npm install
          cd ../frontend && npm install

      - name: Lint backend
        run: cd projects/backend && npm run lint
        continue-on-error: true

      - name: Lint frontend
        run: cd projects/frontend && npm run lint
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd projects/backend && npm install
          cd ../frontend && npm install

      - name: Test backend
        run: cd projects/backend && npm run test
        continue-on-error: true

      - name: Test frontend
        run: cd projects/frontend && npm run test
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd projects/backend && npm install
          cd ../frontend && npm install

      - name: Build backend
        run: cd projects/backend && npm run build

      - name: Build frontend
        run: cd projects/frontend && npm run build

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: projects/backend/dist

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: projects/frontend/dist

  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./projects/backend
          push: ${{ secrets.DOCKER_USERNAME != '' && true || false }}
          tags: ${{ secrets.DOCKER_USERNAME }}/music-player-backend:latest
        continue-on-error: true

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./projects/frontend
          push: ${{ secrets.DOCKER_USERNAME != '' && true || false }}
          tags: ${{ secrets.DOCKER_USERNAME }}/music-player-frontend:latest
        continue-on-error: true
